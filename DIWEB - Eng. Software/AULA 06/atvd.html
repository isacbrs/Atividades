<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade</title>
</head>
<body>
    <form action="">
        <table border="0">
            <tr>
                <td> <label align="right">Nome:</label> </td>
                <td> <input type="text" name="nome" size="30"> </td>
                <td> <Label>Mensagem:</Label></td>
                <td rowspan="2" valign="top">
                    <textarea name="mensagem" rows="3" cols="30"></textarea>
                </td>
            </tr>
            <tr>
                <td> <label> E-mail:</label> </td>
                <td colspan="2"> <input type="email" name="email" size="42"> </td>
            </tr>
            <tr>
                <td> <label> Sexo: </label> </td>
                <td colspan="3">
                    <input type="radio" value="feminino" name="sexo" required>Masculino
                    <input type="radio" value="masculino" name="sexo" required>Feminino 
                </td>
            </tr>
            <tr>
                <td colspan="4" align="center"> <input type="submit" value="CADASTRAR"> </td>
            </tr>
        </table>
    </form>
</body>
</html>
