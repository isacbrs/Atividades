<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
</head>
<body>
    <form action="" method>
        <table border="1" align="center" width="300px" cellpadding="10">
            <tr>
                <td> <label align="right">Login:</label> </td>
                <td> <input type="text" name="login" size="30"> </td>
            </tr>
            <tr>
                <td> <label align="right">Senha:</label> </td>
                <td> <input type="password" name="senha" maxlength="6" size="30"> </td>
            </tr>
            <tr>
                <td colspan="2" align="center"> <input type="submit" value="Logar"> </td>
            </tr>
        </table>
    </form>
</body>
</html>
