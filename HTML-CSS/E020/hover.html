<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
    div{
        width: 124px;
    }    
    div > p {
        display:none;
    }
    
    div:hover> p {
        display: block;
        width: 130px;
        background-color: brown;
        color: white;
    }
    </style>
</head>
<body>
    <h1>Exemplo de Hover:</h1>
    <div>
        passe o mouse aqui
        <p>Texto escondido</p>       
    </div>
        <div>
        passe o mouse aqui
        <p>Texto escondido</p>       
    </div>


</body>
</html>
