<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixas</title>
    <style>

        h1{
            background-color: rgb(177, 177, 177);
            height: 50px;
            width: 250px;
            border-width: 10px;
            border-style: solid;
            border-color: rgb(0, 39, 0);

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px ;
            
            margin: auto;
            
            outline-width: 5px;
            outline-style: dashed;
            outline-color: blue;
        }

        a {
            border-width: 3px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Caixa Box-Level</h1>
    <p>Parágrafo também é Box-level</p>
    <a href="#">Links são Inline-Level</a>
</body>
</html>
